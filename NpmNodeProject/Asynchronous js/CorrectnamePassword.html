<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1> correct user password with Async await</h1>

    <script>
        function getUser() {
            return new Promise((resolve, reject) => {
                let isUserFound = true; // Assuming isUserFound is defined somewhere
                if (isUserFound) {
                    setTimeout(() => {
                        resolve("User is found");
                    }, 3000);
                } else {
                    reject("User is not found");
                }
            });
        }

        let getPassword = () => {
            let isPassFound = false; // Assuming isPassFound is defined somewhere
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    if (isPassFound) {
                        resolve("Password is found");
                    } else {
                        reject("Password is not found");
                    }
                }, 2000);
            });
        };

        (async function getResult() {
            try {
                let user = await getUser();
                console.log(user);
                let pass = await getPassword();
                console.log(pass);
            } catch (error) {
                console.error(error);
            }
        })();
    </script>
</body>

</html>
