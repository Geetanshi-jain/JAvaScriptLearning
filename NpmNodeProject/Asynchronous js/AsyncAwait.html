<!DOCTYPE html>
<html>

<head>
    <title>Async Await</title>
</head>

<body>
    <script>
        function getCheese() {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    if (true) resolve("Cheese is getting............");
                    else reject("Cheese is out of stock.....");
                }, 2000);
            });
        }

        function makeDough() {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    if (true) resolve("Dough is making............");
                    else reject("Flour is out of stock.....");
                }, 2000);
            });
        }

        function getPizza() {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    if (true) resolve("Pizza is delivered............");
                    else reject("Location not found.....");
                }, 2000);
            });
        }

        /* It's called inside an immediate invoke function */
        (async function CallPromise() {
            try {
                let cheese = await getCheese();
                console.log(cheese);
                let dough = await makeDough();
                console.log(dough);
                let pizza = await getPizza();
                console.log(pizza);
            } catch (error) {
                console.error(error);
            }
        })();
    </script>
</body>

</html>
